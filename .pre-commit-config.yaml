repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: \.(bat|cmd|ps1)$
  - repo: local
    hooks:
      - id: npm-build
        name: npm build
        description: Build typescript.
        entry: npm run build
        language: system
        types: [ts]
        pass_filenames: false

      - id: npm-test
        name: npm test
        description: Run vitest.
        entry: npm run test
        language: system
        types: [ts]
        pass_filenames: false

      - id: coverage-shields
        name: Update Coverage Shields
        description: Run vitest coverage and update README.md shields
        entry: bash -c './scripts/update_shields.sh'
        language: system
        types: [ts]
        pass_filenames: false
        always_run: true
